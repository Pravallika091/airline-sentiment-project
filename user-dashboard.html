<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>User Dashboard</title>
<style>
:root {
  font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  color: #102a43;
  background: #eef6fb;
}
* {
  box-sizing: border-box;
}
body {
  margin: 0;
  min-height: 100vh;
  background: linear-gradient(180deg, #f3f8ff 0%, #eef6fb 100%);
}
.page-shell {
  max-width: 1120px;
  margin: 0 auto;
  padding: 32px 28px 44px;
}
.topbar {
  display: flex;
  flex-direction: row;
  justify-content: space-between;
  align-items: center;
  gap: 18px;
  padding: 24px;
  background: white;
  border-radius: 24px;
  border: 1px solid rgba(15, 23, 42, 0.08);
  box-shadow: 0 22px 62px rgba(15, 23, 42, 0.08);
}
.topnav {
  display: flex;
  justify-content: flex-end;
  gap: 18px;
  flex-wrap: wrap;
}
.brand {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  font-weight: 800;
  font-size: 1.05rem;
  color: #0f172a;
  white-space: nowrap;
}
.brand span {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 42px;
  height: 42px;
  border-radius: 14px;
  background: #eff6ff;
  color: #1d4ed8;
}
.topnav a {
  color: #2563eb;
  text-decoration: none;
  font-weight: 700;
}
.topnav a:hover {
  text-decoration: underline;
}
.hero {
  display: block;
  margin-top: 32px;
}
.hero-copy {
  display: block;
  gap: 18px;
}
.eyebrow {
  display: inline-flex;
  padding: 8px 14px;
  border-radius: 999px;
  background: rgba(37, 99, 235, 0.12);
  color: #1e3a8a;
  letter-spacing: 0.02em;
  font-size: 0.9rem;
  font-weight: 700;
}
.hero-copy h1 {
  margin: 0;
  font-size: clamp(2.2rem, 2.8vw, 3rem);
  line-height: 1.05;
}
.hero-copy p {
  margin: 0;
  color: #475569;
  line-height: 1.75;
  max-width: 640px;
}
.review-card {
  margin-top: 34px;
  padding: 34px;
  border-radius: 32px;
  background: white;
  border: 1px solid rgba(15, 23, 42, 0.08);
  box-shadow: 0 34px 88px rgba(15, 23, 42, 0.08);
}
.review-card__header {
  display: flex;
  flex-wrap: wrap;
  justify-content: space-between;
  gap: 18px;
  align-items: center;
  margin-bottom: 28px;
}
.review-card__header h2 {
  margin: 0;
  font-size: clamp(1.8rem, 2.4vw, 2.2rem);
  white-space: nowrap;
  overflow-wrap: normal;
}
.review-card__header p {
  margin: 0;
  color: #475569;
}
.form-grid {
  display: grid;
  gap: 20px;
}
.field {
  display: grid;
  gap: 10px;
}
label {
  font-weight: 700;
  color: #334155;
}
select,
textarea {
  width: 100%;
  padding: 16px 18px;
  border: 1px solid rgba(15, 23, 42, 0.12);
  border-radius: 18px;
  background: #f8fafc;
  color: #102a43;
  font-size: 1rem;
  transition: border-color 0.2s ease, box-shadow 0.2s ease;
}
select:focus,
textarea:focus {
  outline: none;
  border-color: #2563eb;
  box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
}
textarea {
  min-height: 190px;
  resize: vertical;
}
.actions {
  display: flex;
  justify-content: flex-start;
  margin-top: 10px;
}
button {
  border: none;
  border-radius: 18px;
  padding: 16px 28px;
  background: #1d4ed8;
  color: white;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 18px 30px rgba(59, 130, 246, 0.18);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}
button:hover {
  transform: translateY(-1px);
}
.result {
  margin-top: 24px;
  padding: 22px 24px;
  border-radius: 24px;
  background: #ffffff;
  border: 1px solid rgba(15, 23, 42, 0.08);
  font-size: 1.03rem;
  font-weight: 700;
  color: #334155;
}
.result.positive {
  color: #047857;
}
.result.negative {
  color: #b91c1c;
}
.result.neutral {
  color: #d97706;
}
@media (max-width: 900px) {
  .hero { display: block; }
}
@media (max-width: 720px) {
  .page-shell { padding: 24px 18px 30px; }
  .review-card { padding: 28px 22px; }
}
</style>
</head>
<body>
<div class="page-shell">
  <header class="topbar">
    <div class="brand"><span>✈</span> Airline Review</div>
    <nav class="topnav">

<a href="user-register.html">➕ Register</a>

<a href="user-login.html">🚪 Logout</a>

</nav>
  </header>
  <section class="hero">
    <div class="hero-copy">
      <span class="eyebrow">Passenger Insights</span>
      <h1>Share your airline experience and get instant sentiment feedback.</h1>
    </div>
  </section>
  <section class="review-card">
    <div class="review-card__header">
      <div>
        <h2>Write your review</h2>
        <p>Select an airline, pick a category, and tell us about your experience in any language.</p>
      </div>
    </div>
    <div class="form-grid">
      <div class="field">
        <label for="airline">Select Airline</label>
        <select id="airline">
          <option>Air India</option>
          <option>IndiGo</option>
          <option>SpiceJet</option>
          <option>Vistara</option>
          <option>Akasa Air</option>
        </select>
      </div>
      <div class="field">
        <label for="category">Select Review Category</label>
        <select id="category">
          <option>Seat Comfort</option>
          <option>Food Quality</option>
          <option>Cabin Crew Service</option>
          <option>Flight Delay</option>
          <option>Baggage Handling</option>
          <option>Ticket Pricing</option>
          <option>Check-in Experience</option>
        </select>
      </div>
      <div class="field">
        <label for="review">Write your experience</label>
        <textarea id="review" placeholder="Example: सीट आरामदायक नहीं था लेकिन स्टाफ अच्छा था"></textarea>
      </div>
    </div>
    <div class="actions">
      <button type="button" onclick="submitReview()">Submit review</button>
    </div>
    <div id="result" class="result" aria-live="polite"></div>
  </section>
</div>
<script>
async function submitReview() {
  const airline = document.getElementById('airline').value;
  const category = document.getElementById('category').value;
  const review = document.getElementById('review').value;
  const resultText = document.getElementById('result');

  if (review.trim() === '') {
    resultText.textContent = 'Please enter your review before submitting.';
    resultText.className = 'result negative';
    return;
  }

  try {
    const response = await fetch('https://2i9d4mmxwc.execute-api.ap-south-1.amazonaws.com/prod/submit-review', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        airline: airline,
        category: category,
        review: review,
        userEmail: 'demo_user@gmail.com'
      })
    });
    const data = await response.json();
    resultText.textContent = 'Sentiment Result: ' + data.sentiment;
    resultText.className = 'result ' + data.sentiment.toLowerCase();
  } catch (error) {
    resultText.textContent = 'Unable to submit review right now. Please try again later.';
    resultText.className = 'result negative';
  }
}
</script>
</body>
</html>
