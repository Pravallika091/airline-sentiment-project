<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>

<style>

body{
margin:0;
height:100vh;
font-family:Inter, system-ui;

/* FLIGHT BACKGROUND */

background:
linear-gradient(rgba(0,0,0,0.5),
rgba(0,0,0,0.5)),
url("https://images.unsplash.com/photo-1436491865332-7a61a109cc05?auto=format&fit=crop&w=1920&q=80");

background-size:cover;
background-position:center;

display:flex;
justify-content:center;
align-items:center;
}

/* GLASS LOGIN CARD */

.card{
background:rgba(255,255,255,0.12);
backdrop-filter:blur(18px);

padding:40px;
width:360px;

border-radius:18px;
box-shadow:0 20px 60px rgba(0,0,0,0.35);

color:white;
}

/* TITLE */

h2{
text-align:center;
margin-bottom:25px;
}

/* INPUT FIELDS */

input{
width:100%;
padding:14px;
margin-bottom:15px;

border:none;
border-radius:8px;
outline:none;
}

/* BUTTON */

button{
width:100%;
padding:14px;

background:#2563eb;
color:white;

border:none;
border-radius:8px;

font-size:16px;
cursor:pointer;

transition:.3s;
}

button:hover{
background:#1e40af;
}

/* LINKS */

a{
display:block;
margin-top:15px;
text-align:center;

color:white;
text-decoration:none;
}

</style>
</head>

<body>

<div class="card">

<h2>Admin Login</h2>

<input placeholder="Admin Email">
<input type="password" placeholder="Password">

<button onclick="loginAdmin()">Login</button>

<a href="admin-register.html">Create Admin Account</a>
<a href="index.html">⬅ Back Home</a>

</div>

<script>
function loginAdmin(){
window.location.href="admin-dashboard.html"
}
</script>

</body>
</html>
