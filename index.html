<!DOCTYPE html>
<html>
<head>
<title>Passenger Sentiment Insight Platform</title>

<style>

body{
margin:0;
font-family:Inter, system-ui, sans-serif;
color:white;
}

/* HERO SECTION */

.hero{

height:100vh;

background:
linear-gradient(rgba(0,0,0,0.55),
rgba(0,0,0,0.55)),

url("https://images.unsplash.com/photo-1436491865332-7a61a109cc05?auto=format&fit=crop&w=1920&q=80");

background-size:cover;
background-position:center;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

text-align:center;

}

/* NAVIGATION */

nav{

position:absolute;
top:30px;
right:40px;

}

nav a{

color:white;
margin-left:30px;
text-decoration:none;
font-weight:600;
font-size:16px;
transition:0.3s;

}

nav a:hover{

color:#38bdf8;

}

/* TITLE */

h1{

font-size:60px;
margin-bottom:15px;

}

/* SUBTITLE */

p{

font-size:18px;
opacity:0.9;

}

/* BUTTONS */

button,
button.button,
a.button {

padding:14px 28px;
border:none;
margin:12px;
display:inline-block;
border-radius:6px;
font-size:16px;
cursor:pointer;
transition:0.3s;
text-decoration:none;
color:white;

}

/* USER BUTTON */

.passenger{

background:#10b981;

}

/* ADMIN BUTTON */

.admin{

background:#2563eb;

}

/* BUTTON HOVER */

button:hover,
a.button:hover{

transform:scale(1.05);

}

</style>

</head>

<body>

<div class="hero">

<h1>Your Journey Begins</h1>

<p>
Passenger Sentiment Insight Platform for Airline Experience Analytics
</p>

<a class="button passenger" href="user-register.html">

Register as Passenger

</a>

<a class="button admin" href="admin-register.html">

Register as Admin

</a>

</div>

</body>
</html>
