<!DOCTYPE html>
<html>
<head>
<title>User Login</title>

<style>

body{

margin:0;
height:100vh;
font-family:Inter, system-ui;

background:
linear-gradient(rgba(0,0,0,0.45),
rgba(0,0,0,0.45)),

url("https://images.unsplash.com/photo-1436491865332-7a61a109cc05?auto=format&fit=crop&w=1920&q=80");

background-size:cover;
background-position:center;

display:flex;
justify-content:center;
align-items:center;

}

/* GLASS LOGIN CARD */

.card{

background:rgba(255,255,255,0.12);
backdrop-filter:blur(18px);

padding:40px;
width:350px;

border-radius:18px;

box-shadow:0 20px 60px rgba(0,0,0,0.25);

color:white;

}

/* TITLE */

h2{

margin-bottom:25px;
text-align:center;

}

/* INPUTS */

input{

width:100%;
padding:14px;
margin-bottom:15px;

border:none;
border-radius:8px;

outline:none;

}

/* BUTTON */

button{

width:100%;
padding:14px;

background:#10b981;
color:white;

border:none;
border-radius:8px;

font-size:16px;
cursor:pointer;

transition:0.3s;

}

button:hover{

background:#059669;

}

/* LINKS */

a{

display:block;
text-align:center;
margin-top:15px;

color:white;
text-decoration:none;

}

</style>

</head>

<body>

<div class="card">

<h2>User Login</h2>

<input placeholder="Email">

<input type="password" placeholder="Password">

<button onclick="loginUser()">Login</button>

<a href="user-register.html">Create new account</a>

<a href="index.html">⬅ Back to Home</a>

</div>

<script>

function loginUser(){

window.location.href="user-dashboard.html"

}

</script>

</body>
</html>
