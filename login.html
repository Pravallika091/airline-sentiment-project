<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Passenger Sentiment Insight Platform</title>
<style>
:root {
  color-scheme: light;
  font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #f4f7fb;
  color: #102a43;
}
* {
  box-sizing: border-box;
}
body {
  margin: 0;
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: 24px;
  background: radial-gradient(circle at top left, rgba(14, 165, 233, 0.18), transparent 36%),
              radial-gradient(circle at bottom right, rgba(59, 130, 246, 0.14), transparent 28%),
              #f4f7fb;
}
.container {
  width: min(100%, 420px);
  background: #ffffff;
  border: 1px solid rgba(15, 23, 42, 0.08);
  border-radius: 28px;
  box-shadow: 0 38px 90px rgba(15, 23, 42, 0.08);
  overflow: hidden;
}
.panel-header {
  padding: 36px 32px 24px;
  text-align: center;
}
.footer-row {
  display: flex;
  flex-direction: column;
  gap: 12px;
  align-items: stretch;
  color: #64748b;
  font-size: 0.95rem;
}
.footer-row a {  align-self: center;  color: #2563eb;
  text-decoration: none;
  font-weight: 700;
}
.footer-row a:hover {
  text-decoration: underline;
}
button {
  width: 100%;
  padding: 16px 20px;
  border: none;
  border-radius: 16px;
  background: linear-gradient(135deg, #1d4ed8, #0ea5e9);
  color: white;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}
.panel-header .eyebrow {
  display: inline-flex;
  margin-bottom: 18px;
  padding: 8px 14px;
  border-radius: 999px;
  background: rgba(37, 99, 235, 0.12);
  color: #1e3a8a;
  font-size: 0.9rem;
  letter-spacing: 0.02em;
  font-weight: 700;
}
.panel-header h1 {
  margin: 0;
  font-size: clamp(2rem, 2.4vw, 2.8rem);
  line-height: 1.05;
  color: #0f172a;
}
.panel-header p {
  margin: 18px 0 0;
  color: #475569;
  line-height: 1.75;
}
.form {
  padding: 0 32px 36px;
  display: grid;
  gap: 18px;
}
.input-group {
  display: grid;
  gap: 10px;
}
label {
  font-weight: 700;
  color: #334155;
}
input,
button,
textarea,
select {
  width: 100%;
  font: inherit;
}
input[type="checkbox"] {
  width: auto;
  margin: 0;
}
input,
textarea,
select {
  padding: 14px 16px;
  border: 1px solid rgba(15, 23, 42, 0.12);
  border-radius: 16px;
  background: #f8fafc;
  color: #0f172a;
  transition: border-color 0.2s ease, box-shadow 0.2s ease;
}
input:focus,
textarea:focus,
select:focus {
  outline: none;
  border-color: #2563eb;
  box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
}
textarea {
  min-height: 140px;
  resize: vertical;
}
.footer-row {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 10px;
  color: #64748b;
  font-size: 0.95rem;
}
.footer-row label {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  white-space: nowrap;
}
.footer-row a {
  color: #2563eb;
  text-decoration: none;
  font-weight: 700;
}
.footer-row a:hover {
  text-decoration: underline;
}
button {
  padding: 16px 20px;
  border: none;
  border-radius: 16px;
  background: linear-gradient(135deg, #1d4ed8, #0ea5e9);
  color: white;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}
button:hover {
  transform: translateY(-1px);
  box-shadow: 0 18px 30px rgba(14, 165, 233, 0.22);
}
.message {
  padding: 16px 18px;
  border-radius: 18px;
  border: 1px solid rgba(37, 99, 235, 0.16);
  background: #eff6ff;
  color: #1e3a8a;
  font-size: 0.98rem;
  display: none;
}
@media (max-width: 520px) {
  .container {
    width: 100%;
  }
  .panel-header {
    padding: 30px 22px 20px;
  }
  .form {
    padding: 0 22px 28px;
  }
}
</style>
</head>
<body>
<div class="container">
  <div class="panel-header">
    <h1>Passenger Sentiment Insight Platform</h1>
    <p>Sign in to access airline experience analytics.</p>
  </div>
  <div class="form">
    <div class="input-group">
      <label for="email">Email address</label>
      <input id="email" type="email" placeholder="you@example.com">
    </div>
    <div class="input-group">
      <label for="password">Password</label>
      <input id="password" type="password" placeholder="Enter your password">
    </div>
    <div class="footer-row">
      <label><input id="remember" type="checkbox"> Remember me</label>
      <a href="index.html">Back to home</a>
    </div>
    <button type="button" onclick="loginUser()">Sign in</button>
    <div id="feedback" class="message" aria-live="polite"></div>
  </div>
</div>
<script>
function loginUser() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const feedback = document.getElementById('feedback');
  feedback.style.display = 'none';
  feedback.textContent = '';
  if (!email || !password) {
    feedback.style.display = 'block';
    feedback.textContent = 'Please enter both email and password.';
    return;
  }
  if (!email.includes('@')) {
    feedback.style.display = 'block';
    feedback.textContent = 'Please enter a valid email address.';
    return;
  }
  feedback.style.display = 'block';
  feedback.textContent = 'Signing in...';
  setTimeout(() => {
    window.location.href = 'user.html';
  }, 650);
}
</script>
</body>
</html>
